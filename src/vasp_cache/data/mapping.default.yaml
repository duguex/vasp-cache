# Default mapping profile — structure geometry in hard key (gen 2)
key_generation: 2
description: >
  Hard key includes structure geometry hash (not formula-only).
  Bumped from gen 1 to fix false-positive collisions on defects/phonons.
hard:
  # formula | geom_hash | false
  structure: geom_hash
  kpoints: true
  potcar: true
  incar:
    - ENCUT
    - PREC
    - ISMEAR
    - SIGMA
    - ISIF
    - LDAU
    - LDAUTYPE
    - LDAUU
    - LDAUJ
    - LDAUL
    - GGA
    - IVDW
    - LASPH
    - METAGGA
    # hybrid / spin — reduce false merges
    - LHFCALC
    - HFSCREEN
    - ISPIN
    - LSORBIT

soft:
  incar:
    - NSW
    - NELM
    - NELMIN
    - EDIFF
