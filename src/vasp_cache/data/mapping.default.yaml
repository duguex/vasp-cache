# Default mapping profile — POSCAR intent geometry + protocol identity (gen 5)
key_generation: 5
description: >
  Hard key includes structure geometry hash (not formula-only).
  Gen 3: POTCAR not in identity.
  Gen 4: INCAR hard audit — NELECT/MAGMOM/NUPDOWN/AEXX/LNONCOLLINEAR/LMAXMIX.
hard:
  # formula | geom_hash | false
  structure: geom_hash
  kpoints: true
  protocol: true
  potcar: false
  incar:
    - ENCUT
    - PREC
    - ISMEAR
    - SIGMA
    - ISIF
    - LDAU
    - LDAUTYPE
    - LDAUU
    - LDAUJ
    - LDAUL
    - LMAXMIX
    - GGA
    - IVDW
    - LASPH
    - METAGGA
    # hybrid / spin / charge
    - LHFCALC
    - HFSCREEN
    - AEXX
    - ISPIN
    - LSORBIT
    - LNONCOLLINEAR
    - MAGMOM
    - NUPDOWN
    - NELECT

soft:
  incar:
    - NSW
    - NELM
    - NELMIN
    - EDIFF
    - EDIFFG
