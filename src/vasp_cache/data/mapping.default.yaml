# Default mapping profile — structure geometry in hard key (gen 3)
key_generation: 3
description: >
  Hard key includes structure geometry hash (not formula-only).
  Gen 3: POTCAR is NOT part of identity (cache never stores POTCAR;
  missing pot file is fine — has/fetch without POTCAR works).
hard:
  # formula | geom_hash | false
  structure: geom_hash
  kpoints: true
  potcar: false
  incar:
    - ENCUT
    - PREC
    - ISMEAR
    - SIGMA
    - ISIF
    - LDAU
    - LDAUTYPE
    - LDAUU
    - LDAUJ
    - LDAUL
    - GGA
    - IVDW
    - LASPH
    - METAGGA
    # hybrid / spin — reduce false merges
    - LHFCALC
    - HFSCREEN
    - ISPIN
    - LSORBIT

soft:
  incar:
    - NSW
    - NELM
    - NELMIN
    - EDIFF
